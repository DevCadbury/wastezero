<div class="auth-outer">
  <div class="auth-card" style="max-width:420px">
    <div class="auth-logo">
      <img src="assets/wastezero_logo.gif" alt="WasteZero" style="height:52px">
      <h2>WasteZero</h2>
    </div>

    <h4 class="text-center mb-1" style="font-weight:700">Reset Password</h4>
    <p class="text-center mb-4" style="font-size:0.875rem;color:#64748b">
      Enter your new password below.
    </p>

    <div *ngIf="success" class="alert alert-success rounded-3 text-center" role="alert">
      <i class="bi bi-check-circle-fill me-2"></i>
      Password reset successfully! Redirecting to login…
    </div>

    <form *ngIf="!success" (ngSubmit)="submit()" #f="ngForm">
      <div *ngIf="error" class="alert alert-danger rounded-3" role="alert">{{ error }}</div>

      <div class="form-group mb-3">
        <label>New Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          minlength="6"
          placeholder="Min. 6 characters"
          class="form-control"
          [disabled]="loading"
        />
      </div>

      <div class="form-group mb-4">
        <label>Confirm New Password</label>
        <input
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
          placeholder="Repeat password"
          class="form-control"
          [disabled]="loading"
        />
      </div>

      <button type="submit" class="btn-wz-primary w-100" [disabled]="loading || !password || !confirmPassword">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        Reset Password
      </button>
    </form>

    <div class="text-center mt-3" style="font-size:0.875rem">
      <a routerLink="/auth" style="color:var(--wz-primary)">Back to Login</a>
    </div>
  </div>
</div>
